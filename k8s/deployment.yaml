apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-openshift
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: springboot-container
          image: pothulasatyasri/springboot-cse-openshift:latest
          ports:
            - containerPort: 8085