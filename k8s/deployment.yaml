apiVersion: apps/v1
kind: Deployment
metadata:
  name: SPringboot-openshift
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cseoc-app
  template:
    metadata:
      labels:
        app: cseoc-app
    spec:
      containers:
      - name: springboot-openshift-container
        image: pothulasatyasri/csekoc:latest
        ports:
        - containerPort: 8085